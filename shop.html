<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>问题搜索 - Zmy</title>
	<link rel="icon" href="./static/img/favicon.ico">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<link rel="stylesheet" href="./static/css/style.css">
	<link rel="stylesheet" href="./static/css/root.css">
	<style>
		.search-page{max-width:720px;margin:0 auto;padding:30px 20px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
		.search-header{width:100%;display:flex;align-items:center;margin-bottom:40px}
		.search-header .back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;background:var(--item_bg_color);backdrop-filter:blur(var(--card_filter));-webkit-backdrop-filter:blur(var(--card_filter));color:var(--main_text_color);font-size:14px;text-decoration:none;transition:all 0.3s}
		.search-header .back-btn:hover{background:var(--item_hover_color);transform:translateX(-3px)}
		.search-header .back-btn svg{width:18px;height:18px}
		.search-logo{font-size:48px;font-weight:800;font-family:"title";margin-bottom:10px;background:linear-gradient(135deg,var(--purple_text_color),#ff9b6b);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
		.search-sub{font-size:15px;color:var(--item_left_text_color);margin-bottom:30px;text-align:center}
		.search-form{width:100%;max-width:560px;display:flex;gap:10px}
		.search-form input{flex:1;padding:14px 18px;border:1px solid rgba(128,128,128,0.2);border-radius:14px;background:rgba(255,255,255,0.06);color:var(--main_text_color);font-size:16px;outline:none;transition:border-color 0.3s;box-sizing:border-box}
		.search-form input:focus{border-color:var(--purple_text_color)}
		.search-form button{padding:14px 28px;border:none;border-radius:14px;background:var(--text_bg_color);color:var(--main_text_color);font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s;white-space:nowrap}
		.search-form button:hover{opacity:0.85}
		.search-tip{margin-top:24px;font-size:13px;color:var(--item_left_text_color);text-align:center}
		@media (max-width:768px){.search-logo{font-size:36px}.search-form{flex-direction:column}.search-form button{width:100%}}
	</style>
</head>
<body>
	<div class="search-page">
		<div class="search-header">
			<a class="back-btn" href="./index.html">
				<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M672 192 320 544l352 352" fill="none" stroke="currentColor" stroke-width="80" stroke-linecap="round" stroke-linejoin="round"/></svg>
				返回首页
			</a>
		</div>
		<div class="search-logo">问题搜索</div>
		<div class="search-sub">输入你想知道的问题，一键跳转百度搜索</div>
		<form class="search-form" onsubmit="return doSearch(event)">
			<input id="q" type="text" placeholder="输入你想知道的问题..." autofocus>
			<button type="submit">搜索</button>
		</form>
		<div class="search-tip">powered by 百度搜索</div>
	</div>
	<script>
		function doSearch(e){e.preventDefault();var q=document.getElementById('q').value.trim();if(q){window.location.href='https://www.baidu.com/s?wd='+encodeURIComponent(q)}else{document.getElementById('q').focus()}return false}

		(function() {
			const audio = document.createElement('audio');
			audio.src = './背景乐.mp3';
			audio.loop = true;
			audio.volume = 0.5;
			audio.preload = 'auto';
			document.body.appendChild(audio);

			const player = document.createElement('div');
			player.style.cssText = 'position:fixed;bottom:80px;right:30px;z-index:9999;';
			player.innerHTML = `
				<div style="width:50px;height:50px;border-radius:50%;background:var(--item_bg_color);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(128,128,128,0.2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--main_text_color);transition:all 0.3s;"
					 onmouseover="this.style.transform='scale(1.1)'"
					 onmouseout="this.style.transform='scale(1)'">
					<svg viewBox="0 0 1024 1024" style="width:24px;height:24px;fill:currentColor;display:none" class="m-play"><path d="M572.9 243.2c-7.1-1.4-14.2-2-21.3-2-60.2 0-109.3 49.1-109.3 109.3v250.2c-12.8-7.6-27.1-12.1-42.7-12.1-60.2 0-109.3 49.1-109.3 109.3s49.1 109.3 109.3 109.3 109.3-49.1 109.3-109.3V372.1c0-36.2 29.3-65.5 65.5-65.5 7.1 0 14.2 1.1 21.3 3.2V243.2z"></path></svg>
					<svg viewBox="0 0 1024 1024" style="width:24px;height:24px;fill:currentColor" class="m-pause"><path d="M349.749455 728.497863a51.2 51.2 0 0 1-51.2 51.2l0 0a51.2 51.2 0 0 1-51.2-51.2V295.683772a51.2 51.2 0 0 1 51.2-51.2l0 0a51.2 51.2 0 0 1 51.2 51.2V728.497863zM776.718909 728.497863a51.2 51.2 0 0 1-51.2 51.2l0 0a51.2 51.2 0 0 1-51.2-51.2V295.683772a51.2 51.2 0 0 1 51.2-51.2l0 0a51.2 51.2 0 0 1 51.2 51.2V728.497863z"></path></svg>
				</div>`;
			document.body.appendChild(player);

			const playIcon = player.querySelector('.m-play');
			const pauseIcon = player.querySelector('.m-pause');
			let playing = false;

			function toggle() {
				if (playing) {
					audio.pause();
					playing = false;
					playIcon.style.display = 'none';
					pauseIcon.style.display = 'block';
					localStorage.setItem('musicPlaying', 'false');
				} else {
					audio.play().then(() => {
						playing = true;
						playIcon.style.display = 'block';
						pauseIcon.style.display = 'none';
						localStorage.setItem('musicPlaying', 'true');
					}).catch(() => {});
				}
			}
			player.querySelector('div').addEventListener('click', toggle);

			function tryPlay() {
				if (localStorage.getItem('musicPlaying') === 'false') return;
				audio.play().then(() => {
					playing = true;
					playIcon.style.display = 'block';
					pauseIcon.style.display = 'none';
				}).catch(() => {
					const firstInteract = () => {
						if (localStorage.getItem('musicPlaying') !== 'false') {
							audio.play().then(() => {
								playing = true;
								playIcon.style.display = 'block';
								pauseIcon.style.display = 'none';
							}).catch(() => {});
						}
						document.removeEventListener('click', firstInteract);
						document.removeEventListener('touchstart', firstInteract);
					};
					document.addEventListener('click', firstInteract, { once: true });
					document.addEventListener('touchstart', firstInteract, { once: true });
				});
			}
			tryPlay();

			try { fetch('/api/visitor.php?path=' + encodeURIComponent(location.pathname)); } catch(e) {}
		})();
	</script>
	<style>
		@media (max-width: 768px) {
			body > div[style*="bottom:80px"] { bottom: 60px !important; right: 20px !important; }
			body > div[style*="bottom:80px"] > div { width: 40px !important; height: 40px !important; }
			body > div[style*="bottom:80px"] svg { width: 20px !important; height: 20px !important; }
		}
	</style>
</body>
</html>
